{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}

    <!-- Bootstrap 5 CDN (required for layout and responsiveness) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #eef1f5;
        }

        .profile-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
        }

        .profile-form-container {
            background: #fff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 800px;
            width: 100%;
        }

        .profile-form-container h2 {
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            color: #222;
        }

        .profile-form-container label {
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .profile-form-container input {
            height: 45px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding-left: 15px;
            transition: all 0.3s ease;
        }

        .profile-form-container input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.1rem rgba(0, 123, 255, 0.25);
        }

        .profile-form-container .btn {
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 30px;
            font-size: 18px;
            transition: 0.3s ease-in-out;
        }

        .btn-update {
            background-color: #ffc107;
            color: #000;
        }

        .btn-update:hover {
            background-color: #e0a800;
        }

        .btn-logout {
            background-color: #dc3545;
            color: #fff;
        }

        .btn-logout:hover {
            background-color: #c82333;
        }

        @media (max-width: 767.98px) {
            .profile-form-container .row > div {
                margin-bottom: 20px;
            }

            .profile-form-container .btn {
                font-size: 16px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

<div class="profile-wrapper">
  <div class="profile-form-container">
    <h2>Update Your Profile</h2>
    <hr>
    {% if messages %}
                                    {% for message in messages %}
                                        {% if message.tags == 'success' %}
                                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                                        {{message}}
                                        <button type="button" class="close" data-dismiss="alert" aria-label="close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                    {% endif %}
                                    {% endfor %}
                                    {% endif %}
    <form action="{% url 'profile_update' %}" method="post">
      {% csrf_token %}
      <div class="row g-4">
        <div class="col-md-6">
          <label>First Name</label>
          <input class="form-control" type="text" placeholder="First Name" value="{{user.first_name}}" name="first_name">
        </div>
        <div class="col-md-6">
          <label>Last Name</label>
          <input class="form-control" type="text" placeholder="Last Name" value="{{user.last_name}}" name="last_name">
        </div>
        <div class="col-md-6">
          <label>Email Address</label>
          <input class="form-control" type="email" placeholder="Email Address" value="{{user.email}}" name="email">
        </div>
        <div class="col-md-6">
          <label>Username</label>
          <input class="form-control" type="text" placeholder="Username" value="{{user.username}}" name="username">
        </div>
        <div class="col-md-12">
          <label>Password</label>
          <input class="form-control" type="password" placeholder="Fill Only If You want To Change Password" name="password">
        </div>
        <div class="col-12 text-center mt-4">
          <button type="submit" class="btn btn-update me-3">
            Update Profile
          </button>
          <a href="{% url 'logout' %}" class="btn btn-logout">
            Logout
          </a>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
