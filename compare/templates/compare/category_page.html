{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ category_name|title }} Products</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f7f8fa;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-weight: 700;
        }

        /* Filters */
        .filter-form {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .filter-form input {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }
        .filter-form input:focus {
            border-color: #2874f0;
        }
        .filter-form button {
            background: #2874f0;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }
        .filter-form button:hover {
            background: #0f5cd8;
        }

        /* Products Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f0f0f0;
            padding: 10px;
        }

        .product-card-content {
            padding: 15px;
        }

        .product-card-content h3 {
            font-size: 18px;
            margin-bottom: 10px;
            min-height: 50px;
            color: #222;
        }

        .product-card-content p {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        .price {
            color: #2874f0;
            font-weight: 600;
            font-size: 16px;
        }

        /* Ribbon for discounts / highlights */
        .ribbon {
            width: 80px;
            height: 25px;
            background: #ff3c3c;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            line-height: 25px;
            position: absolute;
            top: 15px;
            left: -25px;
            transform: rotate(-45deg);
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        /* Empty state */
        .no-products {
            grid-column: 1/-1;
            text-align: center;
            font-size: 18px;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<h2>{{ category_name|title }} Products</h2>

<!-- Filters -->
<form method="get" class="filter-form">
    <input type="number" name="price_min" placeholder="Min Price" value="{{ request.GET.price_min }}">
    <input type="number" name="price_max" placeholder="Max Price" value="{{ request.GET.price_max }}">
    <button type="submit"><i class="fas fa-filter"></i> Apply Filter</button>
</form>

<!-- Products Grid -->
<div class="products">
    {% for product in products %}
   <div class="product-card">
    <a href="{% url 'product_detail' product.id %}">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p class="price">₹{{ product.price }}</p>
    </a>
</div>
    {% empty %}
    <div class="no-products">
        No products found for this category.
    </div>
    {% endfor %}
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
